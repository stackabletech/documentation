---
site:
  title: Stackable Documentation
  url: https://docs.stackable.tech
  start_page: home::index.adoc
  robots: allow
  keys:
    enable_tracking: false
urls:
  # This replaces the component version in the URL of the latest stable version with 'stable'
  # i.e. /commons-operator/stable/index.html instead of /commons-operator/0.3/index.html
  latest_version_segment: stable
antora:
  extensions:
    - require: '@sntke/antora-mermaid-extension'
      mermaid_library_url: https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs
      script_stem: mermaid-scripts
    - ./lib/stackable-operator-helpers.js
    - ./lib/llms-txt.js
content:
  sources:
    - url: ./
      branches:
        - HEAD
    # management tools
    - url: ../stackablectl/
      start_path: docs
    # demos
    - url: ../demos/
      start_path: docs
    # internal operators
    - url: ../commons-operator/
      start_path: docs
    - url: ../secret-operator/
      start_path: docs
    - url: ../listener-operator/
      start_path: docs
    # product operators
    - url: ../airflow-operator/
      start_path: docs
    - url: ../druid-operator/
      start_path: docs
    - url: ../hbase-operator/
      start_path: docs
    - url: ../hdfs-operator/
      start_path: docs
    - url: ../hive-operator/
      start_path: docs
    - url: ../kafka-operator/
      start_path: docs
    - url: ../nifi-operator/
      start_path: docs
    - url: ../opa-operator/
      start_path: docs
    - url: ../opensearch-operator/
      start_path: docs
    - url: ../spark-k8s-operator/
      start_path: docs
    - url: ../superset-operator/
      start_path: docs
    - url: ../trino-operator/
      start_path: docs
    - url: ../zookeeper-operator/
      start_path: docs
ui:
  bundle:
    url: ./ui/build/ui-bundle.zip
  supplemental_files: ./supplemental-ui
asciidoc:
  extensions:
    - '@asciidoctor/tabs'
  attributes:
    base-repo: https://github.com/stackabletech
    # an external icon. Create a link opening in a new tab like this: http://my-url.com[Text {external-link-icon}^]
    external-link-icon: "<svg class=\"svg-icon\" style=\"width: 0.75em; height: 0.75em; margin-left: 3px;\" viewBox=\"0 0 512 512\" aria-hidden=\"true\"><path d=\"M320 0c-17.7 0-32 14.3-32 32s14.3 32 32 32h82.7L201.4 265.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L448 109.3V192c0 17.7 14.3 32 32 32s32-14.3 32-32V32c0-17.7-14.3-32-32-32H320zM80 32C35.8 32 0 67.8 0 112V432c0 44.2 35.8 80 80 80H400c44.2 0 80-35.8 80-80V320c0-17.7-14.3-32-32-32s-32 14.3-32 32V432c0 8.8-7.2 16-16 16H80c-8.8 0-16-7.2-16-16V112c0-8.8 7.2-16 16-16H192c17.7 0 32-14.3 32-32s-14.3-32-32-32H80z\"/></svg>"
# the default caching directory is ./.cache/antora
# Antora caches the git repos, this can sometimes lead to stale content
# use 'make clean' to remove the build and cache directory
runtime:
  cache_dir: ./cache
  log:
    failure_level: warn
